name: Deploy UI

on:
  push:
    branches: [master]
    paths:
      - 'src/golf-scheduler-ui/**'
      - '.github/workflows/ui-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]
    paths:
      - 'src/golf-scheduler-ui/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  APP_LOCATION: 'src/golf-scheduler-ui'
  OUTPUT_LOCATION: 'dist'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/golf-scheduler-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.APP_LOCATION }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.APP_LOCATION }}
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api-golfscheduler-dev.azurewebsites.net' }}
          VITE_BYPASS_AUTH: ${{ vars.VITE_BYPASS_AUTH || 'false' }}
          VITE_B2C_CLIENT_ID: ${{ vars.VITE_B2C_CLIENT_ID }}
          VITE_B2C_AUTHORITY: ${{ vars.VITE_B2C_AUTHORITY }}
          VITE_B2C_KNOWN_AUTHORITIES: ${{ vars.VITE_B2C_KNOWN_AUTHORITIES }}
          VITE_B2C_REDIRECT_URI: ${{ vars.VITE_B2C_REDIRECT_URI }}
          VITE_B2C_SCOPES: ${{ vars.VITE_B2C_SCOPES }}

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
          app_location: 'src/golf-scheduler-ui'
