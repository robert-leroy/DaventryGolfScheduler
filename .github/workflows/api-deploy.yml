name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'src/GolfScheduler.Api/**'
      - '.github/workflows/api-deploy.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/GolfScheduler.Api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  DOTNET_VERSION: "9.0.x"
  AZURE_WEBAPP_NAME: "api-golfscheduler-${{ github.event.inputs.environment || 'dev' }}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/GolfScheduler.Api/GolfScheduler.Api.csproj

      - name: Build
        run: dotnet build src/GolfScheduler.Api/GolfScheduler.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test src/GolfScheduler.Api/GolfScheduler.Api.csproj --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Publish
        run: dotnet publish src/GolfScheduler.Api/GolfScheduler.Api.csproj --configuration Release --no-build --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: "${{ github.event.inputs.environment || 'dev' }}"
      url: "${{ steps.deploy-to-webapp.outputs.webapp-url }}"

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Run database migrations
        run: |
          az webapp config appsettings list \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "rg-golfscheduler-${{ github.event.inputs.environment || 'dev' }}" \
            --query "[?name=='ConnectionStrings__DefaultConnection'].value" -o tsv
        continue-on-error: true
